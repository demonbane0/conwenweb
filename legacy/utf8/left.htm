<script language="JavaScript">
<!--
function namosw_init_clock()
{
  var type, i, top, obj, clocks;
  clocks = new Array();
  for (i = 0, top = 0; i < namosw_init_clock.arguments.length; i += 2) {
    obj = eval('document.'+namosw_init_clock.arguments[i]);
    if (obj == null) continue;
    if ((type = namosw_init_clock.arguments[i+1]) < 1 && 11 < type) continue;
    clocks[top++] = obj;
    clocks[top++] = type;
  }
  clocks.months = new Array('1月', '2月', '3月', '4月', '5月', '6月', '7月',
                            '8月', '9月', '10月', '11月', '12月');
  clocks.days   = new Array('星期日', '星期一', '星期二', '星期三',
                            '星期四', '星期五', '星期六');
  clocks.k_days = new Array('橾', '錯', '', '熱', '跡', '旎', '饜');
  clocks.ampm_str   = new Array('上午', '下午');
  clocks.k_ampm_str = new Array('螃瞪', '螃');

  if (top > 0) {
    document.namosw_clocks = clocks;
    namosw_clock();
  }
}

function namosw_clock()
{
  var i, type, clocks, next_call, str, hour, ampm, now, year2, year4;
  clocks = document.namosw_clocks;
  if (clocks == null) return;
  next_call = false;
  for (i = 0; i < clocks.length; i += 2) {
    obj   = clocks[i];
    type  = clocks[i+1];
    now   = new Date();
    year2 = now.getYear();
    year4 = year2;
    if (year2 < 1000) year4 = 1900 + year2;
    if (year2 >= 100) year2 = year4;

    if (type == 1 || type == 2) {
      obj.value = year4 + '年 ' + clocks.months[now.getMonth()] + ' ' + now.getDate() + '日';
      if (type == 2) 
        obj.value = obj.value + ' ' + clocks.days[now.getDay()];
    } else if (type == 3 || type == 4) {
      obj.value = year2 + '/' + (now.getMonth()+1) + '/' + now.getDate();
    } else if (type == 5 || type == 6) {
      obj.value = (now.getMonth()+1) + '/' + now.getDate() + '/' + year2;
    } else if (type == 8 || type == 9 || type == 10 || type == 11) {
      obj.value = year4 + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';
      if (type == 9)
        obj.value += ' ' + clocks.k_days[now.getDay()] + '星期';
    }
    if (type == 4 || type == 6 || type == 7 || type == 10 || type == 11) {
      hour = now.getHours();
      ampm = 0;
      if (hour >= 12) {
	if (hour > 12) hour -= 12;
	ampm = 1;
      }
      if (type == 10 || type == 11) {
	str = clocks.k_ampm_str[ampm] +' '+ hour+'點 '+ now.getMinutes() +'分';
	if (type == 11) str += ' ' + now.getSeconds() +'秒';
      } else {
	str = clocks.ampm_str[ampm] + ' ' + hour +':'+ ((now.getMinutes() < 10) ? '0'+now.getMinutes():now.getMinutes()) +':'+ ((now.getSeconds() < 10) ? '0'+now.getSeconds():now.getSeconds());
      }
      if (type == 7) obj.value  = str;
      else           obj.value += ' ' + str;
    }
    if (type == 4 || type == 6 || type == 7 || type == 10 || type == 11)
      next_call = true;
  }
  if (next_call)
    window.setTimeout("namosw_clock();", 1000);
}

// -->
</script>
